summarization_task:
  description: >
    Understand the user query: {query}. Do proper research from the information available and list down the facts and summarize them in proper markdwon structure. If you do not know the answer for a query, you reply with I don't know, but you do not give made up answers and try not to hallucinate at best. 
  expected_output: >
    List of summarized facts about query: {query} in proper markdown structure. Always talk about facts and do not hallucinate.
  agent: researcher_summarization
  markdown: true


